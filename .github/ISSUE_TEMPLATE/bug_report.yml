name: Bug Report
description: Report a bug to help us improve the repository.
title: '[Bug]: '
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        ### 👋 Thanks for reporting a bug
        Give us precise details. The better your report, the faster it gets fixed.

  # 🔧 Environment Core
  - type: input
    id: image_version
    attributes:
      label: Docker Image Version / Tag
      placeholder: e.g., 3.0, latest, 7.4-fpm
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker Version
      placeholder: e.g., 24.0.7
    validations:
      required: true

  - type: input
    id: docker_compose_version
    attributes:
      label: Docker Compose Version
      placeholder: e.g., v2.23.0

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local
        - Development
        - Staging
        - Production
    validations:
      required: true

  # 🖥️ Host System (secondary, not primary)
  - type: dropdown
    id: os
    attributes:
      label: Host Operating System
      options:
        - Ubuntu
        - Debian
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      placeholder: e.g., Ubuntu 22.04

  # 📦 App Context
  - type: textarea
    id: setup_details
    attributes:
      label: Setup Details
      description: Describe your setup (Magento version, services, volumes, etc.)
      placeholder: |
        - Magento version:
        - Database:
        - Redis/Valkey:
        - Nginx/Apache:
        - Custom configs:

  # 🐛 Bug Core
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What’s the problem?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start containers with `docker compose up`
        2. Run ...
        3. Observe error
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Always
        - Sometimes
        - Rarely
        - Unable to reproduce
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
    validations:
      required: true

  # 📜 Logs (guided, not open-ended)
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Include only relevant logs:
        - `docker logs <container>`
        - PHP errors
        - Nginx logs
      render: shell

  # ⚙️ Config dump (optional but powerful)
  - type: textarea
    id: compose_file
    attributes:
      label: docker-compose.yml (if relevant)
      render: yaml

  # 📊 Impact
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocking (cannot proceed)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (minor issue)

  # 📸 Optional
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
